<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>litnotes • my reading journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }
        .book-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .book-card:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        .note-card {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-800">
    <div class="max-w-7xl mx-auto">
        <!-- Navbar -->
        <nav class="bg-white border-b border-zinc-200 sticky top-0 z-50">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-amber-800 rounded-xl flex items-center justify-center text-white text-2xl">📖</div>
                    <div>
                        <span class="heading-font text-3xl font-bold tracking-tight">litnotes</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-8 text-sm">
                    <a href="#" onclick="showSection('home')" class="nav-link font-medium hover:text-amber-700 transition-colors active">Home</a>
                    <a href="#" onclick="showSection('bookshelf')" class="nav-link font-medium hover:text-amber-700 transition-colors">Bookshelf</a>
                    <a href="#" onclick="showSection('notes')" class="nav-link font-medium hover:text-amber-700 transition-colors">Notes</a>
                    <button onclick="showAddModal()" 
                            class="bg-amber-800 hover:bg-amber-900 text-white px-5 py-2.5 rounded-2xl flex items-center gap-x-2 text-sm font-medium transition-all active:scale-95">
                        <i class="fa-solid fa-plus"></i>
                        New Note
                    </button>
                </div>
            </div>
        </nav>

        <!-- Hero / Home Section -->
        <div id="home-section" class="section px-8 py-16">
            <div class="max-w-2xl">
                <h1 class="heading-font text-7xl font-bold leading-none tracking-tighter mb-4">
                    Your personal<br>reading sanctuary.
                </h1>
                <p class="text-xl text-zinc-600 mb-10">
                    Capture thoughts, quotes, and insights from every book you read.
                </p>
                <div class="flex items-center gap-x-4">
                    <button onclick="showAddModal()" 
                            class="bg-amber-800 text-white px-8 py-4 rounded-3xl flex items-center gap-x-3 text-lg font-medium hover:bg-amber-900 transition-all">
                        <i class="fa-solid fa-book"></i>
                        Start a new note
                    </button>
                    <button onclick="showSection('bookshelf')" 
                            class="border border-zinc-300 px-8 py-4 rounded-3xl flex items-center gap-x-3 text-lg font-medium hover:bg-white transition-all">
                        Browse bookshelf
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-6 mt-20">
                <div class="bg-white p-8 rounded-3xl border border-zinc-100">
                    <div class="text-5xl font-semibold text-amber-800 mb-2" id="stat-books">12</div>
                    <div class="text-zinc-500">Books read</div>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-zinc-100">
                    <div class="text-5xl font-semibold text-amber-800 mb-2" id="stat-notes">47</div>
                    <div class="text-zinc-500">Notes taken</div>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-zinc-100">
                    <div class="text-5xl font-semibold text-amber-800 mb-2" id="stat-pages">2840</div>
                    <div class="text-zinc-500">Pages explored</div>
                </div>
            </div>
        </div>

        <!-- Bookshelf Section -->
        <div id="bookshelf-section" class="section hidden px-8 py-12">
            <div class="flex justify-between items-end mb-8">
                <h2 class="heading-font text-5xl font-semibold tracking-tight">Bookshelf</h2>
                <div class="relative w-80">
                    <input id="search-input" 
                           onkeyup="filterBooks()"
                           type="text" 
                           placeholder="Search books or authors..." 
                           class="w-full bg-white border border-zinc-200 rounded-2xl px-5 py-4 pl-12 focus:outline-none focus:border-amber-300">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-zinc-400"></i>
                </div>
            </div>
            
            <div id="books-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- All Notes Section -->
        <div id="notes-section" class="section hidden px-8 py-12">
            <h2 class="heading-font text-5xl font-semibold tracking-tight mb-8">All Notes</h2>
            <div id="notes-list" class="space-y-6">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Note Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-[100] flex items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-2xl mx-4 shadow-2xl">
            <div class="flex justify-between items-center border-b px-8 py-6">
                <h3 class="text-2xl font-semibold" id="modal-title">New Reading Note</h3>
                <button onclick="hideModal()" class="text-3xl text-zinc-400 hover:text-zinc-600">×</button>
            </div>
            
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-500 mb-2">Book Title</label>
                    <input id="book-title" type="text" 
                           class="w-full border border-zinc-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-300"
                           placeholder="The Midnight Library">
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Author</label>
                        <input id="book-author" type="text" 
                               class="w-full border border-zinc-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-300"
                               placeholder="Matt Haig">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Rating</label>
                        <div class="flex gap-x-2 text-3xl" id="rating-stars">
                            <span onclick="setRating(1)" class="cursor-pointer text-amber-300 hover:text-amber-400">★</span>
                            <span onclick="setRating(2)" class="cursor-pointer text-amber-300 hover:text-amber-400">★</span>
                            <span onclick="setRating(3)" class="cursor-pointer text-amber-300 hover:text-amber-400">★</span>
                            <span onclick="setRating(4)" class="cursor-pointer text-amber-300 hover:text-amber-400">★</span>
                            <span onclick="setRating(5)" class="cursor-pointer text-amber-300 hover:text-amber-400">★</span>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-zinc-500 mb-2">Key Takeaways / Summary</label>
                    <textarea id="summary" rows="4"
                              class="w-full border border-zinc-200 rounded-3xl px-5 py-4 focus:outline-none focus:border-amber-300 resize-none"
                              placeholder="What was the main message of the book?"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-zinc-500 mb-2">Favorite Quotes</label>
                    <textarea id="quotes" rows="3"
                              class="w-full border border-zinc-200 rounded-3xl px-5 py-4 focus:outline-none focus:border-amber-300 resize-none"
                              placeholder="“The only way to make sense out of change is to plunge into it...”"></textarea>
                </div>
            </div>
            
            <div class="border-t px-8 py-6 flex justify-end gap-x-4">
                <button onclick="hideModal()" 
                        class="px-8 py-4 text-zinc-600 font-medium hover:bg-zinc-100 rounded-2xl transition-colors">
                    Cancel
                </button>
                <button onclick="saveNote()" 
                        class="bg-amber-800 text-white px-10 py-4 rounded-2xl font-medium hover:bg-amber-900 transition-all">
                    Save Note
                </button>
            </div>
        </div>
    </div>

    <!-- Book Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-xl z-[100] flex items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl max-h-[90vh] overflow-hidden">
            <div class="p-8">
                <div class="flex justify-end">
                    <button onclick="hideDetailModal()" class="text-4xl text-zinc-300 hover:text-zinc-500">×</button>
                </div>
                <div id="detail-content" class="space-y-8">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample data
        let notes = [
            {
                id: 1,
                title: "Atomic Habits",
                author: "James Clear",
                rating: 5,
                summary: "Small changes compound into remarkable results. The 1% better every day rule is life-changing.",
                quotes: "“You do not rise to the level of your goals. You fall to the level of your systems.”",
                date: "May 12, 2026"
            },
            {
                id: 2,
                title: "The Midnight Library",
                author: "Matt Haig",
                rating: 4,
                summary: "A beautiful exploration of regret, choices, and the lives we could have lived.",
                quotes: "“It is quite a revelation to discover that the lives we lead are the lives we choose.”",
                date: "April 28, 2026"
            },
            {
                id: 3,
                title: "Dune",
                author: "Frank Herbert",
                rating: 5,
                summary: "Epic masterpiece about politics, ecology, religion, and destiny.",
                quotes: "“I must not fear. Fear is the mind-killer.”",
                date: "March 15, 2026"
            }
        ]

        let currentEditId = null
        let currentRating = 5

        function renderBooks() {
            const grid = document.getElementById('books-grid')
            grid.innerHTML = ''
            
            notes.forEach(note => {
                const card = document.createElement('div')
                card.className = `book-card bg-white border border-zinc-100 rounded-3xl overflow-hidden cursor-pointer`
                card.innerHTML = `
                    <div class="h-48 bg-gradient-to-br from-amber-100 to-amber-200 flex items-center justify-center text-6xl border-b">
                        📘
                    </div>
                    <div class="p-6">
                        <div class="font-semibold text-lg leading-tight mb-1">${note.title}</div>
                        <div class="text-zinc-500 text-sm">${note.author}</div>
                        <div class="flex text-amber-400 mt-3">
                            ${'★'.repeat(note.rating)}
                        </div>
                        <div onclick="event.stopImmediatePropagation(); showDetail(${note.id})" 
                             class="mt-6 text-xs uppercase tracking-widest font-medium text-amber-700 hover:text-amber-800">
                            View notes →
                        </div>
                    </div>
                `
                card.onclick = () => showDetail(note.id)
                grid.appendChild(card)
            })
        }

        function renderNotes() {
            const container = document.getElementById('notes-list')
            container.innerHTML = ''
            
            notes.forEach(note => {
                const div = document.createElement('div')
                div.className = `note-card bg-white border border-zinc-100 rounded-3xl p-8`
                div.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <div class="text-2xl font-semibold">${note.title}</div>
                            <div class="text-zinc-500">${note.author} • ${note.date}</div>
                        </div>
                        <div class="text-3xl text-amber-400">${'★'.repeat(note.rating)}</div>
                    </div>
                    <div class="my-6 text-zinc-600 leading-relaxed">
                        ${note.summary}
                    </div>
                    ${note.quotes ? `
                    <div class="italic border-l-4 border-amber-200 pl-6 py-1 text-zinc-600">
                        ${note.quotes}
                    </div>` : ''}
                    <div class="mt-8 flex gap-x-4">
                        <button onclick="editNote(${note.id}); event.stopImmediatePropagation()" 
                                class="text-sm px-6 py-3 border border-zinc-200 rounded-2xl hover:bg-zinc-50">
                            Edit
                        </button>
                        <button onclick="deleteNote(${note.id}); event.stopImmediatePropagation()" 
                                class="text-sm px-6 py-3 border border-red-200 text-red-600 rounded-2xl hover:bg-red-50">
                            Delete
                        </button>
                    </div>
                `
                container.appendChild(div)
            })
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'))
            document.getElementById(section + '-section').classList.remove('hidden')
            
            // Update active nav
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active', 'text-amber-700')
                if (link.getAttribute('onclick').includes(section)) {
                    link.classList.add('active', 'text-amber-700')
                }
            })
        }

        function showAddModal() {
            currentEditId = null
            document.getElementById('modal-title').textContent = 'New Reading Note'
            document.getElementById('book-title').value = ''
            document.getElementById('book-author').value = ''
            document.getElementById('summary').value = ''
            document.getElementById('quotes').value = ''
            setRating(5)
            document.getElementById('modal').classList.remove('hidden')
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden')
        }

        function setRating(rating) {
            currentRating = rating
            const stars = document.getElementById('rating-stars').children
            for (let i = 0; i < 5; i++) {
                stars[i].className = i < rating 
                    ? "cursor-pointer text-amber-400" 
                    : "cursor-pointer text-amber-300 hover:text-amber-400"
            }
        }

        function saveNote() {
            const title = document.getElementById('book-title').value.trim()
            const author = document.getElementById('book-author').value.trim()
            
            if (!title || !author) {
                alert("Please enter book title and author")
                return
            }
            
            const
